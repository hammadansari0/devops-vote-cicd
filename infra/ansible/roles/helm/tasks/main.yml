- name: Wait for k3s nodes to be ready
  shell: kubectl wait --for=condition=Ready nodes --all --timeout=120s
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Install Helm
  shell: |
    curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  args:
    creates: /usr/local/bin/helm

# -----------------------------
# Add Helm Repositories
# -----------------------------
- name: Add Bitnami repo (Postgres)
  shell: helm repo add bitnami https://charts.bitnami.com/bitnami
  register: bitnami_repo
  changed_when: "'already exists' not in bitnami_repo.stderr"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Update Helm repos
  shell: helm repo update
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

# -----------------------------
# Copy Postgres Values File
# -----------------------------
- name: Copy postgres values.yaml
  copy:
    src: postgres-values.yaml
    dest: /home/ubuntu/postgres-values.yaml
    mode: '0644'

# -----------------------------
# Install PostgreSQL via Helm
# -----------------------------
- name: Install PostgreSQL via Helm
  shell: |
    helm install postgres bitnami/postgresql \
    -f /home/ubuntu/postgres-values.yaml \
    --namespace default
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  args:
    creates: /home/ubuntu/.postgres_installed

- name: Mark postgres installed
  file:
    path: /home/ubuntu/.postgres_installed
    state: touch