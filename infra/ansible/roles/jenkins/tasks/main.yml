# -----------------------------
# Remove old broken Jenkins repo
# -----------------------------
- name: Remove old Jenkins repo (if exists)
  file:
    path: /etc/apt/sources.list.d/jenkins.list
    state: absent

- name: Remove old Jenkins key (if exists)
  file:
    path: /etc/apt/trusted.gpg.d/jenkins.gpg
    state: absent

# -----------------------------
# Install dependencies
# -----------------------------
- name: Install required packages
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: yes

# -----------------------------
# Add Jenkins key (OFFICIAL 2026)
# -----------------------------
- name: Ensure keyrings directory exists
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Add Jenkins GPG key (2026 official)
  get_url:
    url: https://pkg.jenkins.io/debian/jenkins.io-2026.key
    dest: /etc/apt/keyrings/jenkins-keyring.asc
    mode: '0644'

# -----------------------------
# Add Jenkins repository
# -----------------------------
- name: Add Jenkins apt repository
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian binary/"
    state: present
    filename: jenkins

# -----------------------------
# Install Java (REQUIRED)
# -----------------------------
- name: Install Java (OpenJDK 21)
  apt:
    name:
      - fontconfig
      - openjdk-21-jre
    state: present
    update_cache: yes

# -----------------------------
# Install Jenkins
# -----------------------------
- name: Install Jenkins
  apt:
    name: jenkins
    state: present

# -----------------------------
# Start Jenkins
# -----------------------------
- name: Start Jenkins
  service:
    name: jenkins
    state: started
    enabled: true

# -----------------------------
# Allow Jenkins to use kubectl (k3s)
# -----------------------------
- name: Create Jenkins .kube directory
  file:
    path: /var/lib/jenkins/.kube
    state: directory
    owner: jenkins
    group: jenkins
    mode: '0755'

- name: Copy k3s kubeconfig to Jenkins
  copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: /var/lib/jenkins/.kube/config
    remote_src: yes
    owner: jenkins
    group: jenkins
    mode: '0644'
  ignore_errors: yes