- name: Wait for k3s nodes to be ready
  shell: kubectl wait --for=condition=Ready nodes --all --timeout=120s
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

# -----------------------------
# Add Prometheus Helm repo
# -----------------------------
- name: Add Prometheus Helm repo
  shell: helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
  register: prom_repo
  changed_when: "'already exists' not in prom_repo.stderr"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Update Helm repos
  shell: helm repo update
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

# -----------------------------
# Install Prometheus + Grafana
# -----------------------------
- name: Install Prometheus + Grafana
  shell: |
    helm install monitoring prometheus-community/kube-prometheus-stack \
    --namespace monitoring --create-namespace
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  args:
    creates: /home/ubuntu/.monitoring_installed

- name: Mark monitoring installed
  file:
    path: /home/ubuntu/.monitoring_installed
    state: touch