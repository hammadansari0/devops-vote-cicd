- name: Initialize k3s master (already done by install script)
  debug:
    msg: "k3s master installed and running."

- name: Install Calico network (optional with k3s)
  shell: kubectl apply -f https://docs.projectcalico.org/manifests/calico.yaml
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  args:
    creates: /home/ubuntu/.calico_installed

- name: Mark Calico installed
  file:
    path: /home/ubuntu/.calico_installed
    state: touch

- name: Initialize k3s master
  debug:
    msg: "k3s master installed and running."

- name: Get k3s node token
  shell: cat /var/lib/rancher/k3s/server/node-token
  register: node_token
  changed_when: false

- name: Set join token fact (global)
  set_fact:
    k3s_join_token: "{{ node_token.stdout }}"
  
