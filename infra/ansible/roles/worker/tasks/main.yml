- name: Wait for master token
  wait_for:
    path: /var/lib/rancher/k3s/server/node-token
    host: "{{ hostvars[groups['k8s_master'][0]].inventory_hostname }}"
    timeout: 120

- name: Join k3s cluster
  shell: |
    curl -sfL https://get.k3s.io | \
    K3S_URL=https://{{ hostvars[groups['k8s_master'][0]].ansible_default_ipv4.address }}:6443 \
    K3S_TOKEN={{ hostvars[groups['k8s_master'][0]].k3s_join_token }} sh -
  args:
    creates: /etc/rancher/k3s/k3s.yaml